<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Janitorfin Preview</title>
</head>
<body>
    <div id="JanitorfinPreviewPage" data-role="page" class="page type-interior pluginConfigurationPage withTabs" data-require="emby-button">
        <div data-role="content">
            <div class="content-primary">
                <div id="navigationTabs" data-role="controlgroup" data-type="horizontal" class="localnav"></div>

                <div class="verticalSection verticalSection-extrabottompadding">
                    <div style="display: flex; gap: 0.75em; flex-wrap: wrap;">
                        <button id="RefreshPreviewButton" is="emby-button" type="button" class="raised emby-button">
                            <span>Refresh Preview</span>
                        </button>
                        <button id="RunDryRunButton" is="emby-button" type="button" class="raised emby-button">
                            <span>Run Dry Run Now</span>
                        </button>
                        <button id="RunLiveCleanupButton" is="emby-button" type="button" class="raised emby-button">
                            <span>Run Cleanup Now</span>
                        </button>
                    </div>
                    <div id="ExecutionSummary" class="fieldDescription" style="margin-top: 1em;"></div>
                </div>

                <div class="verticalSection verticalSection-extrabottompadding">
                    <h2>Candidate Summary</h2>
                    <div id="PreviewSummary" class="fieldDescription"></div>
                </div>

                <div class="verticalSection verticalSection-extrabottompadding">
                    <h2>Candidates</h2>
                    <div id="PreviewResults"></div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            function getConfigurationPageUrl(name) {
                return 'configurationpage?name=' + encodeURIComponent(name);
            }

            function setTabs(selectedIndex) {
                var tabs = [
                    { href: getConfigurationPageUrl('Janitorfin'), name: 'Settings' },
                    { href: getConfigurationPageUrl('Janitorfin_Preview'), name: 'Preview' }
                ];
                var container = document.querySelector('#navigationTabs');
                container.innerHTML = '';
                tabs.forEach(function (tab, index) {
                    var element = document.createElement('a');
                    element.innerHTML = tab.name;
                    element.className = 'emby-button' + (index === selectedIndex ? ' ui-btn-active' : '');
                    element.dataset.role = 'button';
                    element.addEventListener('click', function () {
                        Dashboard.navigate('/' + tab.href, false);
                    });
                    container.appendChild(element);
                });
            }

            function fetchJson(url, method) {
                return ApiClient.fetch({
                    url: ApiClient.getUrl(url),
                    type: method || 'GET',
                    contentType: 'application/json',
                    data: '{}'
                });
            }

            function escapeHtml(value) {
                return (value || '')
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;');
            }

            function formatDate(value) {
                if (!value) {
                    return 'n/a';
                }

                var date = new Date(value);
                return isNaN(date.getTime()) ? value : date.toLocaleString();
            }

            function formatEpisodeCode(candidate) {
                if (candidate.SeasonNumber == null || candidate.EpisodeNumber == null) {
                    return '';
                }

                return 'S' + String(candidate.SeasonNumber).padStart(2, '0') + 'E' + String(candidate.EpisodeNumber).padStart(2, '0');
            }

            function renderPreview(result) {
                var summary = document.querySelector('#PreviewSummary');
                var container = document.querySelector('#PreviewResults');

                summary.textContent = 'Scanned ' + result.ScannedItemCount + ' items. Found ' + result.CandidateCount + ' cleanup candidates.';

                if (!result.Candidates || !result.Candidates.length) {
                    container.innerHTML = '<div class="fieldDescription">No cleanup candidates matched the current rules.</div>';
                    return;
                }

                var html = result.Candidates.map(function (candidate) {
                    var labels = [];
                    if (candidate.LibraryName) {
                        labels.push('Library: ' + escapeHtml(candidate.LibraryName));
                    }
                    if (candidate.SeriesName) {
                        labels.push('Series: ' + escapeHtml(candidate.SeriesName));
                    }
                    if (candidate.SeasonName) {
                        labels.push('Season: ' + escapeHtml(candidate.SeasonName));
                    }
                    if (formatEpisodeCode(candidate)) {
                        labels.push('Episode: ' + escapeHtml(formatEpisodeCode(candidate)));
                    }
                    if (candidate.AppliedRuleName) {
                        labels.push('Rule: ' + escapeHtml(candidate.AppliedRuleName));
                    }
                    if (candidate.PlayedByUsers && candidate.PlayedByUsers.length) {
                        labels.push('Played by: ' + escapeHtml(candidate.PlayedByUsers.join(', ')));
                    }

                    var thresholds = [];
                    if (candidate.EffectiveDeleteAfterWatchDays != null) {
                        thresholds.push('Watched: ' + escapeHtml(String(candidate.EffectiveDeleteAfterWatchDays)) + ' days');
                    }
                    if (candidate.EffectiveDeleteNeverWatchedAfterDays != null) {
                        thresholds.push('Never watched: ' + escapeHtml(String(candidate.EffectiveDeleteNeverWatchedAfterDays)) + ' days');
                    }

                    return [
                        '<div class="listItem" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 0.5rem; margin-bottom: 0.75rem;">',
                        '<div style="display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">',
                        '<div>',
                        '<div style="font-weight: 600;">' + escapeHtml(candidate.ItemName) + '</div>',
                        '<div class="fieldDescription">' + escapeHtml(candidate.ItemType) + '</div>',
                        '</div>',
                        '<div class="fieldDescription">' + escapeHtml(candidate.Reason) + '</div>',
                        '</div>',
                        labels.length ? '<div class="fieldDescription" style="margin-top: 0.5rem;">' + labels.join(' | ') + '</div>' : '',
                        thresholds.length ? '<div class="fieldDescription" style="margin-top: 0.5rem;">' + thresholds.join(' | ') + '</div>' : '',
                        '<div class="fieldDescription" style="margin-top: 0.5rem;">Added: ' + escapeHtml(formatDate(candidate.DateAddedUtc)) + ' | Last played: ' + escapeHtml(formatDate(candidate.LastPlayedDateUtc)) + '</div>',
                        candidate.Path ? '<div class="fieldDescription" style="margin-top: 0.5rem; word-break: break-all;">' + escapeHtml(candidate.Path) + '</div>' : '',
                        '</div>'
                    ].join('');
                }).join('');

                container.innerHTML = html;
            }

            function renderExecutionSummary(result) {
                var summary = document.querySelector('#ExecutionSummary');
                summary.textContent = [
                    result.DryRun ? 'Dry run complete.' : 'Cleanup run complete.',
                    'Candidates: ' + result.CandidateCount,
                    'Deleted: ' + result.DeletedCount,
                    'Failed: ' + result.FailedCount,
                    'Radarr updated: ' + result.RadarrUpdatedCount,
                    'Sonarr updated: ' + result.SonarrUpdatedCount
                ].join(' ');
            }

            function loadPreview() {
                Dashboard.showLoadingMsg();
                fetchJson('Janitorfin/Preview', 'GET').then(function (result) {
                    renderPreview(result);
                    Dashboard.hideLoadingMsg();
                }).catch(function (error) {
                    document.querySelector('#PreviewSummary').textContent = error.message || 'Preview request failed.';
                    document.querySelector('#PreviewResults').innerHTML = '';
                    Dashboard.hideLoadingMsg();
                });
            }

            document.querySelector('#JanitorfinPreviewPage').addEventListener('pageshow', function () {
                setTabs(1);
                loadPreview();
            });

            document.querySelector('#RefreshPreviewButton').addEventListener('click', function () {
                loadPreview();
            });

            document.querySelector('#RunDryRunButton').addEventListener('click', function () {
                Dashboard.showLoadingMsg();
                fetchJson('Janitorfin/Execute?dryRun=true', 'POST').then(function (result) {
                    renderExecutionSummary(result);
                    loadPreview();
                }).catch(function (error) {
                    document.querySelector('#ExecutionSummary').textContent = error.message || 'Dry run execution failed.';
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#RunLiveCleanupButton').addEventListener('click', function () {
                Dashboard.confirm({
                    title: 'Run Janitorfin Cleanup',
                    message: 'This will delete matching media immediately using the current saved configuration.'
                }).then(function () {
                    Dashboard.showLoadingMsg();
                    fetchJson('Janitorfin/Execute?dryRun=false', 'POST').then(function (result) {
                        renderExecutionSummary(result);
                        loadPreview();
                    }).catch(function (error) {
                        document.querySelector('#ExecutionSummary').textContent = error.message || 'Cleanup execution failed.';
                        Dashboard.hideLoadingMsg();
                    });
                });
            });
        </script>
    </div>
</body>
</html>
