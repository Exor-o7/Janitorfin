name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content '.\Janitorfin.Plugin\Janitorfin.Plugin.csproj'
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          $tagVersion = '${{ github.ref_name }}'
          if ($tagVersion.StartsWith('v')) {
            $tagVersion = $tagVersion.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw 'Project version was not found in Janitorfin.Plugin.csproj.'
          }

          if ($projectVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match project version '$projectVersion'."
          }

          "project_version=$projectVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore .\Janitorfin.Plugin\Janitorfin.Plugin.csproj

      - name: Build
        run: dotnet build .\Janitorfin.Plugin\Janitorfin.Plugin.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish .\Janitorfin.Plugin\Janitorfin.Plugin.csproj -c Release -o .\artifacts\publish\Janitorfin --no-build

      - name: Package zip
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD 'artifacts/publish/Janitorfin'
          $packageDir = Join-Path $PWD 'artifacts/package'
          $zipPath = Join-Path $packageDir 'Janitorfin.zip'
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath

      - name: Compute package checksum
        id: checksum
        shell: pwsh
        run: |
          $zipPath = Join-Path $PWD 'artifacts/package/Janitorfin.zip'
          $checksum = (Get-FileHash -Algorithm MD5 $zipPath).Hash.ToLowerInvariant()
          "md5=$checksum" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/package/Janitorfin.zip
          generate_release_notes: true

      - name: Fetch release metadata
        id: metadata
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            'User-Agent' = 'github-actions'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $bodyPath = Join-Path $PWD 'artifacts/release-body.txt'
          $body = if ($null -eq $release.body) { '' } else { [string]$release.body }
          [System.IO.File]::WriteAllText($bodyPath, $body, [System.Text.UTF8Encoding]::new($false))
          "published_at=$($release.published_at)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "body_path=$bodyPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate Jellyfin repository manifest
        shell: pwsh
        run: |
          .\scripts\build-plugin-manifest.ps1 `
            -Version '${{ steps.version.outputs.project_version }}' `
            -Checksum '${{ steps.checksum.outputs.md5 }}' `
            -Timestamp '${{ steps.metadata.outputs.published_at }}' `
            -SourceUrl 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Janitorfin.zip' `
            -ChangelogPath '${{ steps.metadata.outputs.body_path }}' `
            -OutputPath '.\manifest.json'

      - name: Commit updated manifest
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git switch main
          git add manifest.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'manifest.json is unchanged.'
            exit 0
          }

          git commit -m "Update plugin manifest for ${{ github.ref_name }}"
          git push origin main
